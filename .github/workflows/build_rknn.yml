name: Build RKNN Model

on:
  workflow_dispatch:
    inputs:
      quant:
        description: 'INT8 양자화 활성화 (true/false)'
        required: false
        default: 'false'

jobs:
  convert:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install PyTorch (CPU-only)
        run: |
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu

      - name: Install numpy first (fast-histogram build dep)
        run: pip install "numpy<=1.26.4"

      - name: Install fast-histogram (source build needs numpy headers)
        run: pip install "fast-histogram>=0.11"

      - name: Install remaining rknn-toolkit2 dependencies
        run: |
          pip install \
            "protobuf>=4.21.6,<=4.25.4" \
            psutil \
            "ruamel.yaml>=0.17.21" \
            "scipy>=1.9.3" \
            "tqdm>=4.64.1" \
            "opencv-python-headless>=4.5.5.64" \
            "onnx>=1.14.0,<=1.16.0" \
            "onnxruntime>=1.10.0,<1.20.0"

      - name: Install rknn-toolkit2
        run: |
          pip install --no-deps \
            "https://github.com/airockchip/rknn-toolkit2/raw/master/rknn-toolkit2/packages/x86_64/rknn_toolkit2-2.3.2-cp310-cp310-manylinux_2_17_x86_64.manylinux2014_x86_64.whl"

      - name: Install ultralytics (ONNX export)
        run: pip install ultralytics onnxsim

      - name: Download YOLOv8n weights
        run: python -c "from ultralytics import YOLO; YOLO('yolov8n.pt')"

      - name: Download COCO128 calibration images (INT8 양자화용, ~7MB)
        if: ${{ github.event.inputs.quant == 'true' }}
        run: |
          python - <<'EOF'
          import urllib.request, zipfile, pathlib
          url = "https://ultralytics.com/assets/coco128.zip"
          print("COCO128 다운로드 중 (~7MB)...")
          urllib.request.urlretrieve(url, "coco128.zip")
          with zipfile.ZipFile("coco128.zip") as z:
              z.extractall()
          imgs = sorted(pathlib.Path("coco128/images/train2017").glob("*.jpg"))
          pathlib.Path("dataset.txt").write_text("\n".join(str(p) for p in imgs))
          print(f"캘리브레이션 이미지 {len(imgs)}장 준비 완료")
          EOF

      - name: Convert to RKNN
        run: |
          FLAG=""
          if [ "${{ github.event.inputs.quant }}" != "true" ]; then
            FLAG="--no-quant"
          fi
          PYTHONPATH=. python scripts/export_rknn.py \
            --model yolov8n.pt \
            --output yolov8n.rknn \
            $FLAG

      - name: Verify output
        run: ls -lh yolov8n.rknn

      - name: Upload RKNN model
        uses: actions/upload-artifact@v4
        with:
          name: yolov8n-rknn-rk3588
          path: yolov8n.rknn
          retention-days: 30
